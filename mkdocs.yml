site_name: openPMD-beamphysics
repo_url: https://github.com/ChristopherMayes/openPMD-beamphysics
repo_name: ChristopherMayes/openPMD-beamphysics

nav:
  - Home: index.md

  - Examples:
      - Particles:
          - examples/particle_examples.ipynb
          - examples/normalized_coordinates.ipynb
          - examples/read_examples.ipynb
          - examples/write_examples.ipynb
          - examples/plot_examples.ipynb
          - examples/bunching.ipynb
      - Fields:
          - examples/fields/field_examples.ipynb
          - examples/fields/field_expansion.ipynb
          - examples/fields/field_tracking.ipynb
          - examples/fields/field_conversion.ipynb
          - examples/fields/corrector_modeling.ipynb
          - examples/fields/solenoid_modeling.ipynb
          - examples/fields/multipole_utils.ipynb
      - Wakefields:
          - examples/wakefields/resistive_wall.ipynb
          - examples/wakefields/impedance_wakefield.ipynb
      - Wavefront:
          - examples/wavefront/wavefront.ipynb
          - examples/wavefront/advanced_drift.ipynb
          - examples/wavefront/experimental_pytorch_wavefront.ipynb
      - Utilities:
          - examples/units.ipynb
          - examples/labels.ipynb

  - API:
      - Particles: api/particles.md
      - Fields: api/fields.md
      - Wakefields: api/wakefields.md

  - Standards:
      - Statistics Standard: api/statistics_standard.md
      - Computed Statistics: api/computed_statistics.md

  - Contributing:
      - Statistics Schema: statistics_schema.md

theme:
  icon:
    repo: fontawesome/brands/github
  name: material

  custom_dir: docs/overrides
  features:
    - navigation.top
    - navigation.tabs
    - navigation.indexes
    - content.code.copy
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: black
      toggle:
        icon: material/toggle-switch-off-outline
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      toggle:
        icon: material/toggle-switch
        name: Switch to light mode

markdown_extensions:
  - attr_list
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.arithmatex: # Enable MathJAX https://squidfunk.github.io/mkdocs-material/reference/mathjax/
      generic: true

extra_javascript:
  - javascripts/mathjax.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

extra:
  generator: false
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/ChristopherMayes/openPMD-beamphysics
      name: openPMD-beamphysics

extra_css:
  - stylesheets/extra.css

plugins:
  - search

  - mkdocs-jupyter:
      include_source: True
  - mkdocstrings:
      handlers:
        python:
          options:
            backlinks: tree
            docstring_options:
              ignore_init_summary: false
            docstring_style: numpy
            docstring_section_style: list
            filters: public
            heading_level: 2
            inherited_members: true
            line_length: 100
            merge_init_into_class: true
            parameter_headings: false
            relative_crossrefs: true
            scoped_crossrefs: true
            separate_signature: true
            show_bases: true
            show_inheritance_diagram: true
            show_root_full_path: false
            show_root_heading: true
            show_signature_annotations: true
            show_signature_type_parameters: true
            show_source: true
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            signature_crossrefs: true
            summary: true
            type_parameter_headings: true
            unwrap_annotated: true
